<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>놀꼬지</title>
  <script>
    (function() {
      var ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.replace('https://apps.apple.com/us/app/%EB%86%80%EA%BC%AC%EC%A7%80/id6753740768');
      } else if (/Android/i.test(ua)) {
        window.location.replace('https://play.google.com/store/apps/details?id=com.visom.nolkkoji');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #28A745;
      --dark: #0D0D0D;
      --card: #222222;
      --text: #F5F5F0;
      --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(40,167,69,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40,167,69,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .blob {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(40,167,69,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 420px; width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: var(--green);
      border: 1px solid rgba(40,167,69,0.3);
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 16px; text-transform: uppercase;
    }
    h1 {
      font-size: clamp(42px, 12vw, 68px);
      font-weight: 900; letter-spacing: -2px; line-height: 1;
      margin-bottom: 12px; color: var(--green);
    }
    .tagline {
      font-size: 15px; color: var(--muted);
      margin-bottom: 40px; line-height: 1.6;
    }
    .stores { display: flex; flex-direction: column; gap: 12px; }
    .btn-store {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 24px;
      background: var(--card); color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .btn-store:hover {
      background: #2a2a2a;
      border-color: rgba(40,167,69,0.4);
      transform: translateY(-1px);
    }
    .footer { margin-top: 36px; font-size: 11px; color: rgba(136,136,136,0.5); }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="container">
    <div class="badge">APP DOWNLOAD</div>
    <h1>놀꼬지</h1>
    <p class="tagline">스포츠 클럽 커뮤니티<br>함께 뛰고, 함께 즐기고</p>
    <div class="stores">
      <a href="https://apps.apple.com/us/app/%EB%86%80%EA%BC%AC%EC%A7%80/id6753740768"
         class="btn-store" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        App Store (iOS)
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.visom.nolkkoji"
         class="btn-store" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.18 23.76c.3.17.64.22.98.15l13.05-7.52-2.75-2.75-11.28 10.12zm-1.7-20.1C1.17 4 1 4.5 1 5.09v13.82c0 .59.17 1.09.48 1.43l.08.07 7.74-7.74v-.18L1.56 3.59l-.08.07zM20.49 10.7l-2.78-1.6-3.09 3.09 3.09 3.08 2.8-1.61c.8-.46.8-1.5-.02-1.96zM4.16.26L17.21 7.78l-2.75 2.75L3.18.41C3.52.34 3.87.39 4.16.56z"/>
        </svg>
        Google Play (Android)
      </a>
    </div>
    <p class="footer">© 2025 놀꼬지 · visom</p>
  </div>
</body>
</html>
